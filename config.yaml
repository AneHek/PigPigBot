# Webhook 服务配置
webhook:
  # 监听地址（仅本地，由 nginx 代理对外）
  host: "127.0.0.1"
  port: 8080
  # 回调路径
  path: "/qqbot/webhook"
  # 回调域名（QQ平台可访问的公网地址，不含协议和端口）
  callback_domain: "https://your-domain.com"
  # 是否本地启用 HTTPS
  #   false: 纯 HTTP，由 nginx 反向代理提供 HTTPS（推荐）
  #   true : 本地直接 HTTPS（需要有效证书，自签名可能被 QQ 拒绝）
  force_https: false
  # SSL 证书配置（force_https 为 true 时生效）
  ssl_cert: "certs/cert.pem"
  ssl_key: "certs/key.pem"
  # 证书绑定的主机名/IP（自动生成自签名证书时使用）
  cert_hostname: "YOUR_SERVER_IP_OR_DOMAIN"

# 图片服务配置
image:
  # 本地图片存储目录
  dir: "data/images"
  # 图片访问路由前缀（QQ 官方通过此路由访问本地图片）
  route: "/static/images"
  # 截图存储子目录
  screenshots_dir: "data/images/screenshots"
  # 宠物形象图来源目录（cropped_pigs1 或 cropped_pigs2）
  pig_source: "cropped_pigs2"
  # 宠物形象图本地绝对路径基础目录（Playwright渲染时使用，需要绝对路径）
  # 例如: "D:/QQBot/data/images/cropped_pigs1"
  pet_image_base_dir: "D:/QQBot/data/images/cropped_pigs2"
  # 截图最大并发数（2GB 内存建议 2，4GB+ 可设 3-4）
  screenshot_concurrency: 2

# Redis 配置
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

# 宠物战斗游戏配置
game:
  # 战斗配置
  battle:
    tick_interval: 0.1
    max_duration: 60

  # 训练配置
  training:
    min_lock_minutes: 10
    exp_per_level_per_minute: 50

  # IV品质二项分布配置
  iv_quality:
    binomial_n: 5
    binomial_p: 0.5
