# Webhook 服务配置
webhook:
  # 监听地址（仅本地，由 nginx 代理对外）
  host: "127.0.0.1"
  # 监听端口
  port: 8080
  # 回调路径
  path: "/qqbot/webhook"
  # 是否本地启用 HTTPS
  #   false: 纯 HTTP，由 nginx 反向代理提供 HTTPS（推荐）
  #   true : 本地直接 HTTPS（需要有效证书，自签名可能被 QQ 拒绝）
  force_https: false
  # SSL 证书配置（force_https 为 true 时生效）
  ssl_cert: "certs/cert.pem"
  ssl_key: "certs/key.pem"
  # 证书绑定的主机名/IP（自动生成自签名证书时使用）
  cert_hostname: "YOUR_SERVER_IP_OR_DOMAIN"

# 图片服务配置
image:
  # 本地图片存储目录
  dir: "data/images"
  # 图片访问路由前缀（QQ 官方通过此路由访问本地图片）
  route: "/static/images"

# Redis 配置
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

# 宠物游戏配置
game:
  # 自然衰减间隔（分钟）
  decay_interval: 10
  # 宠物类型
  pet_types:
    - id: cat
      name: "猫咪"
      emoji: "🐱"
      desc: "优雅的小猫咪，各项属性均衡"
      base_stats:
        satiety: 70
        mood: 70
        health: 80
        energy: 60
    - id: dog
      name: "小狗"
      emoji: "🐶"
      desc: "忠诚的小狗，活力充沛"
      base_stats:
        satiety: 60
        mood: 80
        health: 75
        energy: 80
    - id: rabbit
      name: "兔子"
      emoji: "🐰"
      desc: "可爱的小兔子，心情愉悦"
      base_stats:
        satiety: 65
        mood: 90
        health: 60
        energy: 65
    - id: dragon
      name: "小龙"
      emoji: "🐲"
      desc: "传说中的小龙，稀有珍品"
      base_stats:
        satiety: 80
        mood: 60
        health: 90
        energy: 85
    - id: panda
      name: "熊猫"
      emoji: "🐼"
      desc: "憨厚的大熊猫，体质强壮"
      base_stats:
        satiety: 75
